// Himitsu secrets schema.
// Canonical definitions for secret entries, encrypted envelopes, store
// manifests, and share payloads.
//
// SECURITY NOTE: Messages marked "plaintext" exist only in memory and are
// NEVER serialised to disk.  The on-disk format is always the age-encrypted
// `SecretEnvelope`.

syntax = "proto3";

package himitsu.secrets;

import "google/protobuf/timestamp.proto";

// ---------------------------------------------------------------------------
// Secret value (in-memory only — NEVER written to disk unencrypted)
// ---------------------------------------------------------------------------

// The plaintext payload that lives inside an age-encrypted envelope.
// After decryption the raw bytes are parsed into this message so that
// structured metadata travels with the value.
message SecretValue {
  // The secret's plaintext value (UTF-8 string or raw bytes).
  bytes data = 1;

  // MIME type hint for the value ("text/plain", "application/json", …).
  string content_type = 2;

  // Application-level metadata attached by the setter.
  map<string, string> annotations = 3;

  // TOTP secret — either an `otpauth://` URI or a raw base32 secret.
  string totp = 4;

  // Associated website / API URL for this secret.
  string url = 5;

  // Optional expiration reminder timestamp.
  google.protobuf.Timestamp expires_at = 6;

  // Optional human-readable description (related to hm-yu4/hm-iq6 column).
  string description = 7;

  // Default environment variable name to use when this secret is injected
  // into a process environment (e.g. by `himitsu exec path/* -- cmd`).
  // When empty, callers fall back to deriving a key from the secret path
  // (typically the last path segment uppercased).
  string env_key = 8;

  // Free-form tags for filtering / grouping. Travels with the encrypted
  // value so tag membership stays atomic with the secret itself.
  // Validated at write time: [A-Za-z0-9_.-]+, 1-64 chars, case-sensitive.
  repeated string tags = 9;
}

// ---------------------------------------------------------------------------
// Secret entry — metadata about one secret in a store
// ---------------------------------------------------------------------------

// Represents a single secret's metadata within a remote / store.
// Corresponds to a file at  vars/<env>/<key_name>.age
message SecretEntry {
  // Canonical key name (e.g. "STRIPE_KEY").
  string key_name = 1;

  // Environment the secret belongs to (e.g. "prod", "dev", "common").
  string environment = 2;

  // Relative path inside the store (e.g. "vars/prod/STRIPE_KEY.age").
  string path = 3;

  // SHA-256 digest of the ciphertext blob (hex-encoded).
  // Useful for change-detection without decryption.
  string content_hash = 4;

  // Size of the encrypted file in bytes.
  uint64 size_bytes = 5;

  // When the secret was first created.
  google.protobuf.Timestamp created_at = 6;

  // When the secret was last modified (re-encrypted or value changed).
  google.protobuf.Timestamp updated_at = 7;

  // The age public key fingerprints of all recipients the secret is
  // currently encrypted to.
  repeated string recipient_fingerprints = 8;

  // Who last set the value (opaque identifier, e.g. "user@host" or a
  // public-key fingerprint).
  string set_by = 9;

  // Free-form tags for filtering / grouping.
  repeated string tags = 10;
}

// ---------------------------------------------------------------------------
// Encrypted envelope — the on-disk / on-wire wrapper
// ---------------------------------------------------------------------------

// Wraps the raw age ciphertext together with non-secret metadata.
// This is what `himitsu set` writes and `himitsu get` reads.
message SecretEnvelope {
  // Envelope format version (currently 1).
  uint32 version = 1;

  // The key this envelope belongs to.
  string key_name = 2;

  // Environment this envelope belongs to.
  string environment = 3;

  // Raw age-encrypted ciphertext.
  // Decrypting this with the correct age identity yields a
  // serialised `SecretValue`.
  bytes ciphertext = 4;

  // Age recipient public keys this ciphertext is encrypted to.
  repeated string recipients = 5;

  // When this envelope was produced.
  google.protobuf.Timestamp encrypted_at = 6;

  // Opaque creator identifier.
  string encrypted_by = 7;

  // Content hash of the ciphertext (SHA-256, hex).
  string content_hash = 8;
}

// ---------------------------------------------------------------------------
// Store manifest — inventory of an entire remote / store
// ---------------------------------------------------------------------------

// A point-in-time snapshot of every secret in a store.
// Useful for sync diffing, auditing, and offline schema generation.
message StoreManifest {
  // Remote identifier (e.g. "org/repo").
  string remote_id = 1;

  // All secret entries in the store.
  repeated SecretEntry entries = 2;

  // All environments present (derived, but denormalised for convenience).
  repeated string environments = 3;

  // When this manifest was generated.
  google.protobuf.Timestamp generated_at = 4;

  // Total number of secrets (across all environments).
  uint32 total_secrets = 5;
}

// ---------------------------------------------------------------------------
// Recipient information
// ---------------------------------------------------------------------------

// Metadata about a single age recipient.
message RecipientInfo {
  // The full age public key (e.g. "age1…").
  string public_key = 1;

  // Fingerprint of the public key (truncated hash).
  string fingerprint = 2;

  // Human-readable label (e.g. "alice@example.com").
  string label = 3;

  // Groups this recipient belongs to.
  repeated string groups = 4;

  // When the key was added to the store.
  google.protobuf.Timestamp added_at = 5;
}
