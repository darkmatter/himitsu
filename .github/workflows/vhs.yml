name: VHS Demo Tapes

on:
  push:
    branches: [main]
    paths:
      - 'demo/**'
      - 'rust/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.github/workflows/vhs.yml'
  pull_request:
    branches: [main]
    paths:
      - 'demo/**'
      - 'rust/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.github/workflows/vhs.yml'

env:
  CARGO_TERM_COLOR: always

jobs:
  vhs:
    name: Render demo tapes
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry and target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-vhs-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-vhs-
            ${{ runner.os }}-cargo-

      - name: Install VHS runtime deps
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg ttyd

      - name: Install VHS
        uses: charmbracelet/vhs-action@v2

      - name: Verify VHS install
        run: vhs --version

      - name: Build himitsu (release)
        run: cargo build --release

      - name: Render demo tapes
        run: |
          set -euo pipefail
          shopt -s nullglob
          out_dir="target/vhs-out"
          mkdir -p "$out_dir/screenshots"
          tapes=(demo/demo.tape demo/tui-us-00*.tape demo/tui-us-01*.tape)
          if [ ${#tapes[@]} -eq 0 ]; then
            echo "error: no VHS tape files found under demo/" >&2
            exit 1
          fi
          failed=0
          for tape in "${tapes[@]}"; do
            echo "::group::vhs $tape"
            tmp_tape="$out_dir/$(basename "$tape")"
            # Redirect generated media into scratch space so CI validates the
            # tapes without dirtying the checkout with binary diffs.
            sed -E \
              -e "s|^Output .*|Output $out_dir/$(basename "${tape%.tape}").gif|" \
              "$tape" > "$tmp_tape"
            if ! vhs "$tmp_tape"; then
              echo "::error file=$tape::vhs failed to render $tape"
              failed=1
            fi
            echo "::endgroup::"
          done
          exit "$failed"

      - name: Upload rendered demos
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vhs-demo-renders
          path: target/vhs-out
